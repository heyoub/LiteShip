name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check

  truth-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium chromium-headless-shell
      - run: pnpm run gauntlet:full
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: truth-artifacts-linux
          path: |
            coverage
            reports
            benchmarks

  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm exec playwright install --with-deps ${{ matrix.browser }}
      - run: pnpm exec vitest run --config vitest.browser.config.ts
        env:
          CI: true
          CZAP_VITEST_BROWSERS: ${{ matrix.browser }}
      - run: pnpm run test:e2e
        if: matrix.browser == 'chromium'
        env:
          CI: true
          CZAP_PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
      - run: pnpm exec playwright test --config tests/e2e/playwright.config.ts tests/e2e/stream.e2e.ts --workers 1
        if: matrix.browser != 'chromium'
        env:
          CI: true
          CZAP_PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: browser-artifacts-${{ matrix.browser }}
          path: |
            tests/browser/__screenshots__
            playwright-report
          if-no-files-found: ignore

  windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm exec tsx scripts/check-invariants.ts
      - run: pnpm test
      - run: pnpm run test:vite
      - run: pnpm run test:astro
      - run: pnpm run test:tailwind
      - run: pnpm run test:redteam
      - run: pnpm run package:smoke

  ci-summary:
    runs-on: ubuntu-latest
    needs:
      - format
      - truth-linux
      - browser-e2e
      - windows-smoke
    steps:
      - run: echo "CI truth lanes passed."
